<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE Sheet Inspector</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
    padding: 32px;
  }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    color: #C20019;
    margin-bottom: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .sub { font-size: 14px; color: #666; margin-bottom: 28px; }
  .btn {
    background: #C20019;
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-family: 'Sarabun', sans-serif;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 28px;
  }
  .btn:hover { background: #e0001e; transform: translateY(-1px); }
  .btn:disabled { background: #444; cursor: not-allowed; transform: none; }
  .sheet-block {
    background: #1a1a22;
    border: 1px solid #2a2a38;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .sheet-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #C20019;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #444; }
  .dot.green { background: #22c55e; }
  .dot.red { background: #ff6b6b; }
  .row-count {
    display: inline-block;
    background: #1e3a2a;
    color: #22c55e;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 2px 12px;
    border-radius: 20px;
    margin-left: 8px;
  }
  .headers-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .header-chip {
    background: #252535;
    border: 1px solid #3a3a50;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    color: #b0b0d0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header-chip .idx {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #555;
  }
  .sample-label { font-size: 12px; color: #555; margin-bottom: 8px; }
  .sample-data {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #7070a0;
    background: #111118;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.8;
  }
  .status { font-size: 13px; color: #888; margin-top: 10px; }
  .error { color: #ff6b6b; }
  .success { color: #22c55e; }
  .loading { color: #f59e0b; }
</style>
</head>
<body>

<h1>⚡ ICE Sheet Inspector</h1>
<p class="sub">ดึง Header + ตัวอย่างข้อมูลจาก Google Sheets แบบ Live — เปิดไฟล์นี้ใน Chrome โดยตรงค่ะ</p>

<button class="btn" id="fetchBtn" onclick="fetchAll()">🔍 ดึงข้อมูล Headers ทั้ง 2 Sheets</button>

<div id="mediaBlock" class="sheet-block" style="display:none">
  <div class="sheet-title">
    <div class="dot" id="mediaDot"></div>
    MEDIA SHEET
    <span id="mediaCount" class="row-count" style="display:none"></span>
  </div>
  <div id="mediaHeaders" class="headers-grid"></div>
  <div id="mediaSample"></div>
  <div id="mediaStatus" class="status"></div>
</div>

<div id="prodBlock" class="sheet-block" style="display:none">
  <div class="sheet-title">
    <div class="dot" id="prodDot"></div>
    PRODUCTION SHEET
    <span id="prodCount" class="row-count" style="display:none"></span>
  </div>
  <div id="prodHeaders" class="headers-grid"></div>
  <div id="prodSample"></div>
  <div id="prodStatus" class="status"></div>
</div>

<script>
const SHEET_ID = "17_enlARrCcCUj7HmjKuxf0IKy-YQnAvuf474CQ229Sg";
const MEDIA_GID = "570373312";
const PROD_GID  = "53967775";

function buildUrl(gid) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`;
}

async function fetchSheet(gid) {
  const res = await fetch(buildUrl(gid));
  const text = await res.text();
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/);
  if (!match) throw new Error("ไม่สามารถ parse ข้อมูลได้");
  return JSON.parse(match[1]);
}

function renderSheet(data, prefix) {
  const table = data.table;
  const cols  = table.cols;
  const rows  = table.rows;

  document.getElementById(prefix + 'Dot').classList.add('green');

  const countEl = document.getElementById(prefix + 'Count');
  countEl.textContent = `${rows.length} rows`;
  countEl.style.display = 'inline-block';

  const headersEl = document.getElementById(prefix + 'Headers');
  headersEl.innerHTML = '';
  cols.forEach((col, i) => {
    if (!col.label) return;
    const chip = document.createElement('div');
    chip.className = 'header-chip';
    chip.innerHTML = `<span class="idx">[${i}]</span> ${col.label}`;
    headersEl.appendChild(chip);
  });

  const sampleEl = document.getElementById(prefix + 'Sample');
  const firstRow = rows[0];
  if (firstRow) {
    const lines = firstRow.c.map((cell, i) => {
      const label = cols[i]?.label || `col${i}`;
      const val   = cell?.v ?? '-';
      return `[${i}] ${label}: "${val}"`;
    }).join('\n');
    sampleEl.innerHTML = `
      <p class="sample-label" style="margin-top:14px; padding-top:14px; border-top:1px solid #2a2a38">
        ตัวอย่างข้อมูล Row แรก:
      </p>
      <div class="sample-data">${lines}</div>`;
  }

  document.getElementById(prefix + 'Status').innerHTML =
    `<span class="success">✓ สำเร็จ — ${cols.filter(c => c.label).length} columns, ${rows.length} rows</span>`;
}

async function fetchAll() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังดึงข้อมูล...';

  ['media','prod'].forEach(p => {
    document.getElementById(p + 'Block').style.display = 'block';
    document.getElementById(p + 'Status').innerHTML =
      '<span class="loading">⏳ กำลังโหลด...</span>';
  });

  for (const [prefix, gid] of [['media', MEDIA_GID], ['prod', PROD_GID]]) {
    try {
      const data = await fetchSheet(gid);
      renderSheet(data, prefix);
    } catch(e) {
      document.getElementById(prefix + 'Dot').classList.add('red');
      document.getElementById(prefix + 'Status').innerHTML =
        `<span class="error">✗ Error: ${e.message}</span>`;
    }
  }

  btn.disabled = false;
  btn.textContent = '🔄 Refresh';
}
</script>
</body>
</html>
